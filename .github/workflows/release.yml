name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches VERSION file
        run: |
          file_version="$(cat VERSION)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$file_version" != "$tag_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match VERSION file ($file_version)"
            exit 1
          fi

      - name: Create source tarball
        run: |
          prefix="scratch-${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="$prefix/" -o "$prefix.tar.gz" HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: scratch-*.tar.gz
