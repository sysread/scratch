name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is needed for the anti-slop commit-message scan
          # in test/93-anti-slop.bats - it walks commits between origin/main
          # (or @{upstream}) and HEAD, which requires more than a shallow
          # clone. fetch-depth: 0 means "complete history".
          fetch-depth: 0

      # Explicit cache for mise-managed tool installations. The jdx/mise-action
      # has its own caching, but installing erlang/elixir from source is slow
      # enough that we want an explicit cache keyed on .mise.toml as a
      # belt-and-suspenders measure. Cache hit skips most of the mise install.
      - name: Cache mise tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/mise
            ~/.cache/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            mise-${{ runner.os }}-

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install system dependencies
        # parallel: used by bats for inter-file parallelism via `-j`
        # curl: declared runtime dep (has-commands scans find it)
        run: sudo apt-get install -y parallel curl

      - name: Run tests
        run: mise run test
