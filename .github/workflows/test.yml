name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install system dependencies
        # parallel: used by bats for inter-file parallelism via `-j`
        # curl: declared runtime dep (has-commands in bin/ scans find it)
        run: sudo apt-get install -y parallel curl

      - name: Run tests
        run: mise run test
