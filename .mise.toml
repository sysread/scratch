# Dev tool versions and tasks for scratch.
#
# Usage:
#   mise install              # install all pinned tools
#   mise run test             # run unit test suite
#   mise run test:integration # run REAL api integration tests (costs money!)
#   mise run lint             # run shellcheck
#   mise run format           # format with shfmt
#   mise run fix              # format + perms
#   mise run check            # lint + test
#   mise run setup            # full dev setup

[tools]
erlang = "latest"
elixir = "latest"
shfmt = "3.12.0"      # pinned: formatting changes cause diffs
shellcheck = "0.11.0" # pinned: new rules can break CI
bats = "latest"
jq = "latest"
gum = "latest"

[tasks.setup]
description = "Full developer setup (runtime deps, mise tools)"
run = "helpers/setup"

[tasks.test]
description = "Run unit test suite"
run = "helpers/run-tests"

[tasks."test:integration"]
description = "Run integration tests against the real Venice API (costs money!)"
run = "helpers/run-integration-tests"

[tasks.lint]
description = "Run shellcheck on all shell files"
run = """
files="$(git ls-files bin/ helpers/ lib/ test/*.bats 'test/*/*.bats' test/helpers.sh | grep -v '\\.md$' || true)"
[ -z "$files" ] || shellcheck $files
"""

[tasks.format]
description = "Format with shfmt"
run = """
files="$(git ls-files bin/ helpers/ lib/ | grep -v '\\.md$' || true) $(git ls-files test/*.bats 'test/*/*.bats' test/helpers.sh || true)"
[ -z "$files" ] || shfmt -w --apply-ignore $files
"""

[tasks.perms]
description = "Enforce file permissions"
run = """
for f in $(git ls-files bin/ helpers/ | grep -v '\\.md$' || true); do chmod +x "$f"; done
for f in $(git ls-files lib/ libexec/ || true); do chmod -x "$f"; done
"""

[tasks.fix]
description = "Format and fix permissions"
depends = ["format", "perms"]

[tasks.check]
description = "Lint and test"
depends = ["lint", "test"]
